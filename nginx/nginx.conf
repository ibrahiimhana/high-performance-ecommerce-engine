# Req #5 — Load Distribution.
# Strategy: least_conn.
# Justification:
#   E-commerce traffic is heterogeneous — product listing requests finish in
#   ~5 ms while checkout requests can take 50–200 ms (lock acquisition,
#   stock decrement, order insert, Celery dispatch). Pure round-robin would
#   send the next request to a worker regardless of how busy it already is,
#   so a worker that just got two checkouts can immediately get a third while
#   peers are idle. least_conn always picks the upstream with the fewest
#   active connections, which evens out tail latency under bursty load.
# IP-hash was rejected because we don't need session stickiness (auth is
# token / DB-session based, and the cart lives in Postgres, not in worker
# memory).

worker_processes auto;
events { worker_connections 1024; }

http {
    upstream django_pool {
        least_conn;
        server web1:8000 max_fails=3 fail_timeout=10s;
        server web2:8000 max_fails=3 fail_timeout=10s;
        server web3:8000 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    # Light rate-limiting so a single client cannot exhaust the pool —
    # complements the in-process semaphore (Req #2).
    limit_req_zone $binary_remote_addr zone=api:10m rate=200r/s;

    server {
        listen 80;
        server_tokens off;

        # Surface which upstream served the request, so we can observe
        # the load distribution from curl/browser.
        add_header X-Served-By $upstream_addr always;

        location / {
            limit_req zone=api burst=400 nodelay;

            proxy_pass http://django_pool;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;
        }
    }
}
