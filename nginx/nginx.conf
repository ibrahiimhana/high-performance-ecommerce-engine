# Load balancing for Django app servers.
# least_conn sends each request to the upstream with the fewest active connections.

worker_processes auto;
events { worker_connections 1024; }

http {
    upstream django_pool {
        least_conn;
        server web1:8000 max_fails=3 fail_timeout=10s;
        server web2:8000 max_fails=3 fail_timeout=10s;
        server web3:8000 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    
    limit_req_zone $binary_remote_addr zone=api:10m rate=200r/s;

    server {
        listen 80;
        server_tokens off;

        # Expose the upstream server for testing load distribution.
        add_header X-Served-By $upstream_addr always;

        location / {
            limit_req zone=api burst=400 nodelay;

            proxy_pass http://django_pool;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;
        }
    }
}
